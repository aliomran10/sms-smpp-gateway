<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
        }

        .container {
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        .field {
            margin: 10px 0;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Profile Page</h2>

    <form action="#" method="post">

        <div class="field">
            <label>Full Name:</label>
            <input type="text" value="Omar Gabr">
        </div>

        <div class="field">
            <label>Email:</label>
            <input type="email" value="omar@example.com">
        </div>

        <div class="field">
            <label>Phone (MSISDN):</label>
            <input type="text" value="+201234567890">
        </div>

        <div class="field">
            <label>Job:</label>
            <input type="text" value="Telecom Engineer">
        </div>

        <div class="field">
            <label>Birthday:</label>
            <input type="date" value="2000-01-01">
        </div>

        <div class="field">
            <label>Address:</label>
            <textarea>Cairo, Egypt</textarea>
        </div>

        <h3>Twilio Info</h3>

        <div class="field">
            <label>Account SID:</label>
            <input type="text" value="ACxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
        </div>

        <div class="field">
            <label>Auth Token:</label>
            <input type="text" value="***************">
        </div>

        <div class="field">
            <label>Sender ID:</label>
            <input type="text" value="+15005550006">
        </div>

        <button type="submit">Update Profile</button>

    </form>
</div>

</body>
</html>
