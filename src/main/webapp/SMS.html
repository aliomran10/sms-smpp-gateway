<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Send SMS</title>

    <style>

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background-color: #357ABD;
        }

        #success-banner {
            display: none;
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }

        #error-banner {
            display: none;
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Send SMS</h2>

    <!-- Success Message -->
    <div id="success-banner">
        SMS Sent Successfully ✅
    </div>

    <!-- Error Message -->
    <div id="error-banner">
        Failed to Send SMS ❌
    </div>

    <!-- SMS Form -->
    <form action="SendSMSServlet"
          method="post">

        <!-- Recipient Number -->
        <input type="text"
               name="to"
               placeholder="Recipient Number (+201234567890)"
               required>

        <!-- SMS Body -->
        <textarea name="body"
                  placeholder="Write your message here..."
                  required></textarea>

        <!-- Submit Button -->
        <button type="submit"
                id="sendBtn">

            Send SMS

        </button>

    </form>

</div>

<script>

    // Read URL parameters
    const params =
        new URLSearchParams(window.location.search);

    // Show success message
    if (params.get('success') === '1') {

        document.getElementById('success-banner')
                .style.display = 'block';
    }

    // Show error message
    if (params.get('error') === '1') {

        document.getElementById('error-banner')
                .style.display = 'block';
    }

    // Prevent multiple clicks
    document.querySelector("form")
            .addEventListener("submit", function () {

        document.getElementById("sendBtn")
                .disabled = true;
    });

</script>

</body>
</html>
