<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send SMS — SMS Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0c1d;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Animated gradient orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #7c3aed, #4f46e5);
            top: -150px; left: -150px;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #0ea5e9, #6366f1);
            bottom: -100px; right: -100px;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .header h2 {
            color: #f1f5f9;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #818cf8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.2s;
        }
        .back-btn:hover {
            color: #a5b4fc;
        }

        .alert {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .alert-success {
            background: rgba(16,185,129,0.12);
            border: 1px solid rgba(16,185,129,0.3);
            color: #a7f3d0;
        }
        .alert-error {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }
        .alert.show { display: flex; }

        .form-group { margin-bottom: 20px; }
        label { display: block; color: #94a3b8; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

        input, textarea {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        textarea { resize: vertical; min-height: 120px; }
        input::placeholder, textarea::placeholder { color: #475569; }
        input:focus, textarea:focus {
            outline: none;
            border-color: #7c3aed;
            background: rgba(124,58,237,0.08);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(124,58,237,0.4);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.5); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2>Send SMS</h2>
            <a href="home" class="back-btn">← Dashboard</a>
        </div>

        <!-- Success Message -->
        <div id="success-banner" class="alert alert-success">
            <span>✅</span> SMS Sent Successfully
        </div>

        <!-- Error Message -->
        <div id="error-banner" class="alert alert-error">
            <span>❌</span> Failed to Send SMS
        </div>

        <form action="SendSMSServlet" method="post">
            <div class="form-group">
                <label for="to">Recipient Number</label>
                <input type="text" id="to" name="to" placeholder="Recipient Number (+201...)" required>
            </div>

            <div class="form-group">
                <label for="body">Message Content</label>
                <textarea id="body" name="body" placeholder="Write your message here..." required></textarea>
            </div>

            <div class="form-group">
                <label for="validityPeriodMinutes">Validity Period (Minutes)</label>
                <input type="number" id="validityPeriodMinutes" name="validityPeriodMinutes" min="1" value="5" placeholder="5" required>
            </div>

            <button type="submit" id="sendBtn" class="btn">Send Message →</button>
        </form>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('success') === '1') {
            document.getElementById('success-banner').classList.add('show');
        }
        if (params.get('error') === '1') {
            document.getElementById('error-banner').classList.add('show');
        }

        document.querySelector("form").addEventListener("submit", function () {
            document.getElementById("sendBtn").disabled = true;
            document.getElementById("sendBtn").innerText = "Sending...";
        });
    </script>
</body>
</html>
